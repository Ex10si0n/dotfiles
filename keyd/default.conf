[ids]
*

[main]
# Caps: Ctrl (hold) / Cmd+Space (tap)
capslock = overload(control, M-space)

# LCtrl: Ctrl (hold) / Ctrl+Space (tap)
leftcontrol = overload(control, C-space)

# Global macOS-style swap: Physical Ctrl acts as Command (Meta)
control = meta
meta = control

[control]
# Word-wise navigation (Ctrl+W/B -> Ctrl+Right/Left)
w = C-right
b = C-left

# Vim Navigation
h = left
j = down
k = up
l = right

[meta]
# macOS-style shortcuts: physical Ctrl+key → Linux Ctrl equivalent
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
s = C-s
w = C-w
t = C-t
n = C-n
f = C-f
q = C-q
r = C-r
p = C-p

# --- Terminal Overrides (Un-swap for signals) ---
[gnome-terminal]
control = control
meta = meta
control.w = C-w
control.b = C-b

[ghostty]
control = control
meta = meta
control.w = C-w
control.b = C-b
