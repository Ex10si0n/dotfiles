format = """\
$username\
$os\
$hostname\
${custom.ssh_label}\
$shlvl\
$singularity\
$kubernetes\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$docker_context\
$package\
(down Toolchain version modules έΗΥ)\
$cmake\
$dart\
$dotnet\
$elixir\
$elm\
$erlang\
$golang\
$helm\
$java\
$julia\
$nim\
$nodejs\
$ocaml\
$perl\
$php\
$purescript\
$python\
$ruby\
$rust\
$swift\
$terraform\
$zig\
(έΗΣ Toolchain version modules έΗΣ)\
$nix_shell\
$conda\
$memory_usage\
$aws\
$gcloud\
$env_var\
$crystal\
$cmd_duration\
$custom\
$time\
(έΗΣ above input line έΗΣ)\
$line_break\
(έΗΥ on input line έΗΥ)\
$jobs\
$battery\
$status\
${custom.prompt_char_ro}\
${custom.prompt_char_ok}\
${custom.prompt_char_err}\
"""

# Timeout for starship to scan files (in milliseconds)
scan_timeout = 30

# Add a new line before the start of the prompt
add_newline = true

[battery]
full_symbol = "≤░Β╣"
charging_symbol = "≤░ΓΕ"
discharging_symbol = "≤░ΓΔ"
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 10
style = "red bold"

[character]
success_symbol = "[ΎΖΧ](bold green)"
error_symbol = "[ΎΣπ](bold red)"
vicmd_symbol = "[Όατ](bold blue)"

[custom.prompt_char_ro]
when = '[ ! -w . ]'
command = 'true'
format = '[≤░ΙΙ](bold yellow) '

[custom.prompt_char_ok]
when = '[ -w . ] && [ "${STARSHIP_CMD_STATUS:-0}" = "0" ]'
command = 'true'
format = '[ΎΖΧ](bold green) '

[custom.prompt_char_err]
when = '[ -w . ] && [ "${STARSHIP_CMD_STATUS:-0}" != "0" ]'
command = 'true'
format = '[ΎΦ░](bold red) '

[cmake]
format = "via [$symbol$version]($style) "
symbol = "≤░ΠΨ "
style = "bold blue"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
show_milliseconds = false
style = "yellow green"
show_notifications = false
min_time_to_notify = 45_000

[conda]
truncation_length = 1
format = "via [$symbol$environment]($style) "
symbol = "≤░Νι "
style = "green bold"
ignore_base = true

[dart]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Όηα "
style = "bold blue"

[directory]
disabled = false
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true
format = "at [$path](bold blue) "
read_only = " ≤▒ηΛ"
read_only_style = "red"
truncation_symbol = "έΑο/"
home_symbol = "ΎΑΧ "

[directory.substitutions]
# 'from' = 'to'

[docker_context]
disabled = false
symbol = "ΎΝΙ "
style = "blue bold"
format = "via [$symbol$context]($style) "
only_with_files = true

[env_var]
disabled = false
symbol = "≤░τπ"
style = "black bold dimmed"
format = "with [$env_value]($style) "

[gcloud]
disabled = true
format = 'on [$symbol$account(\($region\))]($style) '
symbol = "≤▒Θ╢ "
style = "bold blue"

[git_branch]
disabled = false
format = "on [$symbol$branch]($style) "
symbol = "ΎΡα "
style = "bold purple"
truncation_symbol = "έΑο"

[git_commit]
disabled = false
commit_hash_length = 7
format = '[\($hash\)]($style) '
style = "green bold"
only_detached = true

[git_state]
disabled = false
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
disabled = false
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "red bold"
stashed = '\$'
ahead = "έΘκ"
behind = "έΘμ"
diverged = "έΘΧ"
conflicted = "="
deleted = "έεα"
renamed = "┬╗"
modified = "!"
staged = "+"
untracked = "?"

[golang]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Όαπ "
style = "bold cyan"

[helm]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "έΟΙ "
style = "bold white"

[hostname]
disabled = false
ssh_only = false
format = "[$hostname](bold red) "
aliases = { "zhongboy-mac" = "gMac" }

[custom.ssh_label]
when = "test -n \"$SSH_CONNECTION\""
command = "echo ' ≤▒Χ╡ ssh'"
format = "via [$output](bold yellow) "

[os]
disabled = false
style = "bold red"

[os.symbols]
Alpine = "ΎΝΑ "
Amazon = "ΎΚ░ "
Android = "ΎΖ╗ "
Arch = "ΎΝΔ "
CentOS = "ΎΝΕ "
Debian = "ΎΝΗ "
DragonFly = "ΌΛΟ "
Emscripten = "ΎΙΖ "
EndeavourOS = "ΎΗΩ "
Fedora = "ΎΝΛ "
FreeBSD = "ΎΛΠ "
Garuda = "≤░δΥ "
Gentoo = "ΎΝΞ "
HardenedBSD = "≤░ηΝ "
Illumos = "≤░Ι╕ "
Linux = "ΎΝγ "
Macos = "ΎΝΓ "
Manjaro = "ΎΝΤ "
Mariner = "ΎΘΞ "
MidnightBSD = "ΎΗΗ "
Mint = "ΎΝΟ "
NetBSD = "ΎΛλ "
NixOS = "ΎΝΥ "
OpenBSD = "≤░Ι║ "
openSUSE = "ΎΝΦ "
Pop = "ΎΝς "
Raspbian = "ΎΝΧ "
Redhat = "ΎΝΨ "
RedHatEnterprise = "ΎΝΨ "
Redox = "≤░κρ "
Solus = "≤░ι│ "
SUSE = "ΎΝΦ "
Ubuntu = "ΎΝδ "
Unknown = "ΎΙφ "

[java]
disabled = false
format = "via [$symbol$version]($style) "
style = "red"
symbol = "ΌΚΨ "

[jobs]
disabled = false
threshold = 1
format = "[$symbol$number]($style)"
symbol = "≤░μΧ "
style = "bold blue"

[julia]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Όαν "
style = "bold purple"

[kubernetes]
disabled = true
symbol = "≤▒Δ╛ "
format = '[$symbol$context( \($namespace\))]($style) in '
style = "bold cyan"

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = 75
format = "via $symbol[$ram( | $swap)]($style) "
style = "white bold dimmed"
symbol = "≤░Ξδ "

[hg_branch]
disabled = false
symbol = "ΎΡα "
style = "bold purple"
format = "on [$symbol$branch]($style) "
truncation_symbol = "έΑο"

[nodejs]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Όεα "
style = "bold green"

[package]
disabled = false
format = "is [$symbol$version]($style) "
symbol = "≤░ΠΩ "
style = "208 bold"
display_private = false

[python]
disabled = false
pyenv_version_name = false
pyenv_prefix = "pyenv "
python_binary = "python"
format = 'via [${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "yellow bold"
symbol = "ΌαΗ "

[ruby]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "ΌηΣ "
style = "bold red"

[rust]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Όηρ "
style = "bold red"

[shlvl]
disabled = true
threshold = 2
format = "[$symbol$shlvl]($style) "
symbol = "έΗΧ"
style = "bold yellow"

[singularity]
disabled = false
format = '[$symbol\[$env\]]($style) '
symbol = "≤░Ω╜ "
style = "blue bold dimmed"

[swift]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "ΌζΧ "
style = "bold 202"

[status]
disabled = true
format = "[$symbol$status]($style) "
symbol = "έεΨ"
style = "bold red"

[terraform]
disabled = false
format = "via [$symbol$workspace]($style) "
symbol = "≤▒Βλ "
style = "bold 105"

[time]
disabled = false
format = "at [$time]($style) "
style = "bold green"
use_12hr = false
time_format = "%H:%M"
utc_time_offset = "local"
time_range = "-"

[username]
disabled = false
format = "[$user]($style) on "
style_root = "blue bold"
style_user = "blue bold"
show_always = true

[zig]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "έΗψ "
style = "bold yellow"
