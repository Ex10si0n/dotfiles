# Timeout for starship to scan files (in milliseconds)
scan_timeout = 30

# Add a new line before the start of the prompt
add_newline = true

[battery]
full_symbol = "¾░ü╣"
charging_symbol = "¾░éä"
discharging_symbol = "¾░éā"
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 10
style = "red bold"

[character]
success_symbol = "[’ģĢ](bold green)"
error_symbol = "[’æ¦](bold red)"
vicmd_symbol = "[Ņś½](bold blue)"

[custom.prompt_char_ro]
when = '[ ! -w . ]'
command = 'true'
format = '[¾░łł](bold yellow) '

[custom.prompt_char_ok]
when = '[ -w . ] && [ "${STARSHIP_CMD_STATUS:-0}" = "0" ]'
command = 'true'
format = '[’ģĢ](bold green) '

[custom.prompt_char_err]
when = '[ -w . ] && [ "${STARSHIP_CMD_STATUS:-0}" != "0" ]'
command = 'true'
format = '[’ö░](bold red) '

[cmake]
format = "via [$symbol$version]($style) "
symbol = "¾░Å¢ "
style = "bold blue"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
show_milliseconds = false
style = "yellow green"
show_notifications = false
min_time_to_notify = 45_000

[conda]
truncation_length = 1
format = "via [$symbol$environment]($style) "
symbol = "¾░īĀ "
style = "green bold"
ignore_base = true

[dart]
disabled = false
format = "via [$symbol$version]($style) "
symbol = "Ņ×ś "
style = "bold blue"

[directory]
disabled = false
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true
format = "at [$path](bold blue) "
read_only = " ¾▒×Ŗ"
read_only_style = "red"
truncation_symbol = "ŌĆ”/"
home_symbol = "’ĆĢ "

[directory.substitutions]
# 'from' = 'to'

[docker_context]
disabled = false
symbol = "’īł "
style = "blue bold"
format = "via [$symbol$context]($style) "
only_with_files = true

[env_var]
disabled = false
symbol = "¾░½¦"
style = "black bold dimmed"
format = "with [$env_value]($style) "

[gcloud]
disabled = true
